<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>elazhar.sch.id</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        html,
        body{
            width:100%;
            height:100%;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;

            background:#ffffff;
            background:radial-gradient(circle at center,
                    #ffffff 0%,
                    #f7f7f7 70%,
                    #ececec 100%);

            font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
            color:#222;
        }

        main{
            width:90%;
            max-width:1200px;
            text-align:center;
            padding:40px;
        }

        h1{
            font-size:5rem;
            font-weight:700;
            line-height:1.1;
            letter-spacing:-2px;
        }

        h1::after{
            content:"";
            display:block;
            width:520px;
            max-width:100%;
            height:14px;
            margin:30px auto;

            background:
                repeating-linear-gradient(
                    45deg,
                    #ffe800,
                    #ffe800 14px,
                    #222 14px,
                    #222 28px
                );
        }

        p{
            font-size:2rem;
            color:#555;
            margin-top:10px;
        }

        @media (max-width:768px){

            h1{
                font-size:3rem;
                letter-spacing:0;
            }

            p{
                font-size:1.25rem;
            }

            h1::after{
                width:280px;
                height:10px;
            }
        }
    </style>

</head>

<body>

    <main>

        <h1>elazhar.sch.id</h1>

        <p>Our website is under construction.</p>

    </main>

</body>
</html>
